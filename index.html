<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BODMAS Premium Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <h1>🎮 BODMAS Game</h1>

  <div class="top-bar">
    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
    <div id="timer">Time: 10</div>
  </div>

  <!-- START -->
  <div id="startScreen">
    <h2>Welcome 🎯</h2>
    <button onclick="startGame()">▶️ Start Game</button>
  </div>

  <!-- GAME -->
  <div id="gameArea" class="hidden">

    <div class="levels">
      <button onclick="setLevel('easy', event)">Easy</button>
      <button onclick="setLevel('medium', event)">Medium</button>
      <button onclick="setLevel('hard', event)">Hard</button>
    </div>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <h2 id="question"></h2>
    <p>Select operation to solve first:</p>

    <div id="options"></div>

    <p id="result"></p>
    <p id="explanation"></p>

    <button onclick="nextQuestion()">Next</button>
  </div>

  <!-- GAME OVER -->
  <div id="gameOver" class="hidden">
    <h2>🏆 Game Over!</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">🔄 Restart</button>
  </div>
</div>

<audio id="correctSound" src="sounds/correct ans.wav"></audio>
<audio id="wrongSound" src="sounds/wrong ans.wav"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script src="script.js"></script>

</body>
</html>
